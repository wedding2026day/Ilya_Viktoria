<section class="block8 reveal">

  <img class="block8-img" src="img/10.png" alt="">

  <div class="form-wrap">

    <form class="guest-form" id="guestForm" action="https://api.web3forms.com/submit" method="POST">

      <input type="hidden" name="access_key" value="765529b4-2dd1-4210-a479-865e64bb3c55">

      <input class="form-input" type="text" name="ФИО" placeholder="Ваше ФИО" required>

      <div class="form-group">
        <p class="form-title">Подтвердите ваше присутствие</p>

        <label class="form-option">
          <input type="radio" name="Присутствие" value="С радостью буду на свадьбе" required>
          <span>С радостью буду на свадьбе</span>
        </label>

        <label class="form-option">
          <input type="radio" name="Присутствие" value="К сожалению, не смогу присутствовать">
          <span>К сожалению, не смогу присутствовать</span>
        </label>
      </div>

      <div class="form-group">
        <p class="form-title">Планируете ли вы прийти с гостем?</p>

        <label class="form-option">
          <input type="radio" name="Гость" value="Да" id="guestYes">
          <span>Да</span>
        </label>

        <label class="form-option">
          <input type="radio" name="Гость" value="Нет">
          <span>Нет</span>
        </label>
      </div>

      <div class="extra-fields" id="guestFields">

        <input class="form-input" type="text" name="ФИО гостя" placeholder="ФИО гостя">

        <input class="form-input" type="text" name="Кем приходитесь друг другу" placeholder="Кем вы приходитесь друг другу?">

      </div>

      <div class="form-group">
        <p class="form-title">Какие напитки предпочитаете?</p>

        <label class="form-option"><input type="checkbox" name="Напитки" value="Водка"><span>Водка</span></label>

        <label class="form-option"><input type="checkbox" name="Напитки" value="Коньяк"><span>Коньяк</span></label>

        <label class="form-option"><input type="checkbox" name="Напитки" value="Джин"><span>Джин</span></label>

        <label class="form-option"><input type="checkbox" name="Напитки" value="Шампанское"><span>Шампанское</span></label>

        <label class="form-option"><input type="checkbox" name="Напитки" value="Вино красное полусладкое"><span>Вино красное полусладкое</span></label>

        <label class="form-option"><input type="checkbox" name="Напитки" value="Вино белое полусухое"><span>Вино белое полусухое</span></label>

        <label class="form-option"><input type="checkbox" name="Напитки" value="Не пью алкоголь"><span>Не пью алкоголь</span></label>

      </div>

      <div class="form-group">
        <p class="form-title">Есть ли у вас аллергия или ограничения в питании?</p>

        <label class="form-option">
          <input type="radio" name="Аллергия" value="Да" id="allergyYes">
          <span>Да</span>
        </label>

        <label class="form-option">
          <input type="radio" name="Аллергия" value="Нет">
          <span>Нет</span>
        </label>
      </div>

      <div class="extra-fields" id="allergyField">

        <input class="form-input" type="text" name="Ограничения" placeholder="На что у вас аллергия/ограничение?">

      </div>

      <div class="form-group">
        <p class="form-title">Понадобится ли вам трансфер?</p>

        <label class="form-option">
          <input type="radio" name="Трансфер" value="Да">
          <span>Да</span>
        </label>

        <label class="form-option">
          <input type="radio" name="Трансфер" value="Нет">
          <span>Нет</span>
        </label>
      </div>

      <div class="form-group">
        <p class="form-title">В какой части праздника вы планируете участвовать?</p>

        <label class="form-option">
          <input type="radio" name="Участие" value="Буду рядом с вами с самого начала и посещу церемонию регистрации">
          <span>Буду рядом с вами с самого начала и посещу церемонию регистрации</span>
        </label>

        <label class="form-option">
          <input type="radio" name="Участие" value="Присоединюсь к празднованию на банкете">
          <span>Присоединюсь к празднованию на банкете</span>
        </label>
      </div>

      <button class="submit-btn" type="submit">
        <img src="img/11.png" alt="">
      </button>

    </form>

  </div>

</section>
